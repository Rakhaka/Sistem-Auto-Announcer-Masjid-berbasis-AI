<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Announcer Pro</title>
    <script src="js/tailwind.js?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: { primary: { DEFAULT: "#008453", 50: "#ecfdf5", 100: "#d1fae5", 200: "#a7f3d0", 300: "#6ee7b7", 400: "#34d399", 500: "#10b981", 600: "#059669", 700: "#008453", 800: "#065f46", 900: "#064e3b" } },
                    fontFamily: { headline: ["Space Grotesk", "sans-serif"], body: ["Inter", "sans-serif"] }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        h1,h2,h3,h4,h5,h6,.font-headline { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-600/20">
                <span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings:'FILL'1">mosque</span>
            </div>
            <h1 class="text-2xl font-headline font-bold text-slate-900">Announcer Pro</h1>
            <p class="text-sm text-slate-500 mt-1">Masuk ke dashboard kontrol audio</p>
        </div>
        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="mb-4">
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Username</label>
                    <input type="text" id="username" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all" placeholder="Masukkan username" required>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-bold text-slate-700 mb-1.5">Password</label>
                    <input type="password" id="password" class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-medium focus:ring-2 focus:ring-emerald-500/20 focus:border-emerald-500 outline-none transition-all" placeholder="Masukkan password" required>
                </div>
                <div id="errorMsg" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700 font-medium"></div>
                <button type="submit" id="loginBtn" class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-bold rounded-lg transition-colors shadow-sm">Masuk</button>
            </form>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script>
        if (isLoggedIn()) window.location.href = 'index.html';

        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errEl = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.textContent = 'Memproses...';
            errEl.classList.add('hidden');
            try {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                await login(username, password);
                window.location.href = 'index.html';
            } catch (err) {
                errEl.textContent = err.message;
                errEl.classList.remove('hidden');
                btn.disabled = false;
                btn.textContent = 'Masuk';
            }
        }
    </script>
</body>
</html>
